<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>best game oat</title>
  <style>
    body {cv 
      margin: 0;
      overflow: hidden;
      background: #1a1a1a;
    }

    canvas {
      display: block;
      background: #2e7d32;
    }

    /* ===== MENU UI ===== */
    #menu {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2196f3, #9c27b0);
      color: white;
      font-family: Arial;
      z-index: 10;
    }

    #menu h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    #menu input {
      padding: 10px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      margin-bottom: 15px;
      text-align: center;
    }

    #menu button {
      padding: 12px 25px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      background: #ffeb3b;
      cursor: pointer;
      font-weight: bold;
    }

    #menu button:hover {
      background: #fff176;
    }

    #leaderboard {
      margin-top: 30px;
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 10px;
      max-width: 300px;
      width: 80%;
    }

    #leaderboard h2 {
      margin-top: 0;
      text-align: center;
    }

    #leaderboard ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #leaderboard li {
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      text-align: center;
    }

    /* ===== BACK BUTTON ===== */
    #backBtn {
      position: absolute;
      top: 15px;
      left: 15px;
      padding: 10px 15px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #ff5252;
      color: white;
      cursor: pointer;
      z-index: 5;
      display: none;
    }

    #backBtn:hover {
      background: #ff7979;
    }
  </style>
</head>
<body>

<div id="menu">
  <h1>best game oat</h1>
  <input id="username" placeholder="Enter username" />
  <button onclick="startGame()">Play</button>

  <div id="leaderboard">
    <h2>🏆 Leaderboard</h2>
    <ul id="scores"></ul>
  </div>
</div>

<button id="backBtn" onclick="goBack()">⬅ Back</button>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== PLAYER ID =====
let playerId = localStorage.getItem("playerId");
if (!playerId) {
  playerId = "player-" + Math.random().toString(36).substr(2, 9);
  localStorage.setItem("playerId", playerId);
}

// ===== USER / MENU =====
let currentUser = "";
let gameStarted = false;

function getScores() {
  return JSON.parse(localStorage.getItem("tailScores") || "[]");
}

// ===== NO DUPES =====
function saveScore(name, score) {
  let scores = getScores();

  const existing = scores.find(s => s.id === playerId);

  if (existing) {
    if (score > existing.score) {
      existing.score = score;
      existing.name = name;
    }
  } else {
    scores.push({ name, score, id: playerId });
  }

  scores.sort((a,b) => b.score - a.score);
  scores = scores.slice(0, 10);

  localStorage.setItem("tailScores", JSON.stringify(scores));
}

function renderLeaderboard() {
  const list = document.getElementById("scores");
  list.innerHTML = "";
  getScores().forEach(s => {
    const li = document.createElement("li");
    li.textContent = `${s.name}: ${s.score}`;
    list.appendChild(li);
  });
}

function startGame() {
  const input = document.getElementById("username");
  if (!input.value.trim()) {
    alert("Enter a username!");
    return;
  }
  currentUser = input.value.trim();
  document.getElementById("menu").style.display = "none";
  document.getElementById("backBtn").style.display = "block";
  gameStarted = true;
}

// ===== RESET FUNCTION (NEW FIX) =====
function resetGame() {
  player.x = canvas.width / 2;
  player.y = canvas.height / 2;

  tail = [];
  maxTailLength = 25;

  foods = [];
  for (let i = 0; i < 12; i++) spawnFood();
}

// ===== BACK BUTTON =====
function goBack() {
  if (gameStarted && currentUser) {
    saveScore(currentUser, maxTailLength);
  }

  resetGame(); // <-- FIX APPLIED HERE

  document.getElementById("menu").style.display = "flex";
  document.getElementById("backBtn").style.display = "none";
  renderLeaderboard();

  gameStarted = false;
}

renderLeaderboard();

// Player
const player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  size: 20,
  speed: 4
};

// Tail system
let tail = [];
let maxTailLength = 25;

// Food
let foods = [];

function spawnFood() {
  foods.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: 10
  });
}

for (let i = 0; i < 12; i++) spawnFood();

// Input
const keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Distance helper
function distance(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

// Update
function update() {
  if (!gameStarted) return;

  if (keys["w"] || keys["arrowup"]) player.y -= player.speed;
  if (keys["s"] || keys["arrowdown"]) player.y += player.speed;
  if (keys["a"] || keys["arrowleft"]) player.x -= player.speed;
  if (keys["d"] || keys["arrowright"]) player.x += player.speed;

  player.x = Math.max(0, Math.min(canvas.width, player.x));
  player.y = Math.max(0, Math.min(canvas.height, player.y));

  const last = tail.length > 0 ? tail[tail.length - 1] : player;

  tail.push({
    x: last.x + (player.x - last.x) * 0.35,
    y: last.y + (player.y - last.y) * 0.35
  });

  while (tail.length > maxTailLength) {
    tail.shift();
  }

  for (let i = foods.length - 1; i >= 0; i--) {
    if (distance(player, foods[i]) < player.size) {
      foods.splice(i, 1);
      maxTailLength += 8;
      spawnFood();
    }
  }
}

// Draw grid
function drawGrid() {
  const gridSize = 40;
  ctx.strokeStyle = "rgba(255,255,255,0.05)";
  ctx.lineWidth = 1;

  for (let x = 0; x < canvas.width; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }

  for (let y = 0; y < canvas.height; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
}

// Draw
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!gameStarted) return;

  drawGrid();

  for (let i = 0; i < tail.length; i++) {
    const seg = tail[i];
    const t = i / tail.length;

    const size = player.size * (0.9 - t * 0.7);

    const r = Math.floor(80 + (1 - t) * 80);
    const g = Math.floor(180 - t * 120);
    const b = Math.floor(255 - t * 60);

    const glow = ctx.createRadialGradient(seg.x, seg.y, 0, seg.x, seg.y, size * 2.5);
    glow.addColorStop(0, `rgba(${r},${g},${b},0.9)`);
    glow.addColorStop(1, "rgba(0,0,0,0)");

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(seg.x, seg.y, size * 2.2, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.beginPath();
    ctx.arc(seg.x, seg.y, size, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "rgba(255,255,255,0.5)";
    ctx.beginPath();
    ctx.arc(seg.x - size * 0.3, seg.y - size * 0.3, size * 0.25, 0, Math.PI * 2);
    ctx.fill();
  }

  foods.forEach(f => {
    const glow = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.size * 2);
    glow.addColorStop(0, "#fff176");
    glow.addColorStop(1, "rgba(255,255,0,0)");

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size * 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#ffeb3b";
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
    ctx.fill();
  });

  const glow = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, player.size * 2);
  glow.addColorStop(0, "#64b5f6");
  glow.addColorStop(1, "rgba(0,0,255,0)");

  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.size * 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#2196f3";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
  ctx.fill();
}

// Loop
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();

// Save score when leaving page
window.addEventListener("beforeunload", () => {
  if (gameStarted && currentUser) {
    saveScore(currentUser, maxTailLength);
  }
});

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
