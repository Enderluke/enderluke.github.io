<!DOCTYPE html>
<html>
<head>
  <title>Sorcerer Draft: Ascension</title>

  <style>
    body {
      font-family: Arial;
      background: #0c0c0c;
      color: white;
      text-align: center;
    }

    h1 { margin-bottom: 5px; }

    .card {
      display: inline-block;
      background: #1a1a1a;
      padding: 15px;
      margin: 10px;
      border-radius: 12px;
      width: 220px;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.08);
      background: #2a2a2a;
    }

    .epic { border: 2px solid violet; }
    .rare { border: 2px solid gold; }

    #bars {
      width: 60%;
      margin: auto;
      text-align: left;
    }

    .bar {
      background: #333;
      margin: 5px 0;
      border-radius: 10px;
      overflow: hidden;
    }

    .fill {
      height: 10px;
      background: #00d4ff;
    }

    button {
      padding: 10px 20px;
      margin-top: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Sorcerer Draft: Ascension</h1>
<h3 id="trait"></h3>

<div id="choices"></div>

<h3>Your Stats</h3>
<div id="bars"></div>

<h3>Abilities</h3>
<ul id="abilities"></ul>

<div id="result"></div>

<script>
const traits = ["tech","dom","spd","iq","dur"];

const sorcerers = [
  {
    name: "Gojo",
    rarity: "epic",
    stats: {tech:10, dom:10, spd:8, iq:9, dur:7},
    ability: (stats)=> stats.tech += 2
  },
  {
    name: "Sukuna",
    rarity: "epic",
    stats: {tech:9, dom:9, spd:7, iq:8, dur:10},
    ability: (stats)=> stats.dur += 3
  },
  {
    name: "Megumi",
    rarity: "rare",
    stats: {tech:8, dom:7, spd:9, iq:8, dur:7},
    ability: (stats)=> stats.spd += 2
  },
  {
    name: "Toji",
    rarity: "rare",
    stats: {tech:6, dom:5, spd:10, iq:7, dur:10},
    ability: (stats)=> stats.spd += 3
  },
  {
    name: "Mahito",
    rarity: "rare",
    stats: {tech:9, dom:8, spd:7, iq:8, dur:8},
    ability: (stats)=> stats.dom += 2
  },
  {
    name: "Shoko",
    rarity: "common",
    stats: {tech:7, dom:8, spd:6, iq:9, dur:9},
    ability: (stats)=> stats.dur += 2
  },
  {
    name: "Yuta",
    rarity: "epic",
    stats: {tech:8, dom:8, spd:8, iq:8, dur:7},
    ability: (stats)=> {
      for (let k in stats) stats[k] += 1;
    }
  }
];

let current = 0;
let total = {tech:0, dom:0, spd:0, iq:0, dur:0};
let abilities = [];

function weightedRandom() {
  let pool = [];
  sorcerers.forEach(s => {
    let weight = s.rarity === "epic" ? 1 :
                 s.rarity === "rare" ? 2 : 4;
    for (let i=0;i<weight;i++) pool.push(s);
  });
  return pool[Math.floor(Math.random()*pool.length)];
}

function getChoices() {
  return [weightedRandom(), weightedRandom(), weightedRandom()];
}

function renderBars() {
  let bars = document.getElementById("bars");
  bars.innerHTML = "";

  for (let key in total) {
    let div = document.createElement("div");
    div.innerHTML = `
      ${key.toUpperCase()}
      <div class="bar">
        <div class="fill" style="width:${total[key]*5}px"></div>
      </div>
    `;
    bars.appendChild(div);
  }
}

function render() {
  document.getElementById("trait").innerText =
    "Draft for: " + traits[current].toUpperCase();

  let choices = document.getElementById("choices");
  choices.innerHTML = "";

  getChoices().forEach(c => {
    let div = document.createElement("div");
    div.className = "card " + c.rarity;

    div.innerHTML = `
      <b>${c.name}</b><br>
      ${c.rarity}<hr>
      Tech:${c.stats.tech} |
      Dom:${c.stats.dom}<br>
      Spd:${c.stats.spd} |
      IQ:${c.stats.iq}<br>
      Dur:${c.stats.dur}
   `;

    div.onclick = ()=> pick(c);
    choices.appendChild(div);
  });
}

function pick(c) {
  for (let k in total) total[k] += c.stats[k];

  c.ability(total);
  abilities.push(c.name);

  let li = document.createElement("li");
  li.innerText = c.name;
  document.getElementById("abilities").appendChild(li);

  current++;

  renderBars();

  if (current >= traits.length) end();
  else render();
}

function synergyScore() {
  let score = 0;

  if (total.tech > 40 && total.dom > 40) score += 20;
  if (total.spd > 45) score += 15;
  if (total.dur > 45) score += 15;

  return score;
}

function end() {
  document.getElementById("choices").innerHTML = "";

  let base = Object.values(total).reduce((a,b)=>a+b,0);
  let final = base + synergyScore();

  let rank = final > 250 ? "SPECIAL GRADE" :
             final > 200 ? "GRADE 1" :
             final > 160 ? "GRADE 2" : "LOW GRADE";

  document.getElementById("result").innerHTML = `
    <h2>${rank}</h2>
    <p>Battle Score: ${final}</p>
    <button onclick="location.reload()">Retry</button>
  `;
}

render();
renderBars();
</script>

</body>
</html>
