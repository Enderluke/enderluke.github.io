<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jujutsu Sorcerer</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #0d0d0d);
    color: white;
    text-align: center;
}

h1 {
    text-shadow: 0 0 15px #7f5af0;
}

.container {
    width: 80%;
    margin: auto;
}

.panel {
    background: rgba(20,20,30,0.9);
    border: 1px solid #444;
    border-radius: 12px;
    padding: 15px;
    margin: 10px;
    box-shadow: 0 0 15px rgba(127,90,240,0.2);
}

.bar {
    height: 20px;
    border-radius: 10px;
    margin: 5px 0;
    background: #333;
    overflow: hidden;
}

.fill {
    height: 100%;
    transition: 0.3s;
}

.hp { background: linear-gradient(90deg, #ff4d4d, #ff0000); }
.ce { background: linear-gradient(90deg, #00c6ff, #0072ff); }

button {
    background: linear-gradient(45deg, #7f5af0, #2cb67d);
    border: none;
    padding: 12px 18px;
    margin: 8px;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 10px #7f5af0;
}

.log {
    height: 200px;
    overflow-y: auto;
    text-align: left;
    background: black;
    padding: 10px;
    border-radius: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<h1>⚡ Jujutsu Math Sorcerer ⚡</h1>

<div class="container">

<div class="panel" id="playerPanel"></div>
<div class="panel" id="enemyPanel"></div>

<div class="panel">
    <button onclick="attack()">Attack</button>
    <button onclick="technique()">Technique</button>
    <button onclick="domain()">Domain</button>
</div>

<div class="panel log" id="log"></div>

</div>

<script>

// ================= STATS =================
let player = {
    hp: 120, maxHp: 120,
    ce: 100, maxCe: 100,
    atk: 15, def: 8,
    luck: 0.15,
    ceControl: 1.2,
    domainTurns: 0
};

let enemy = {
    hp: 150,
    atk: 12,
    def: 6,
    luck: 0.05,
    aggression: 0.65
};

// ================= HELPERS =================
function rand(min, max) {
    return Math.random() * (max - min) + min;
}

function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
}

function log(msg) {
    let el = document.getElementById("log");
    el.innerHTML += msg + "<br>";
    el.scrollTop = el.scrollHeight;
}

// ================= DAMAGE =================
function calculateDamage(attacker, defender) {
    let base = Math.pow(attacker.atk, 1.1) / Math.pow(defender.def, 0.9);
    let variance = rand(0.85, 1.15);
    let crit = Math.random() < attacker.luck ? 1.8 : 1;

    return Math.floor(base * variance * crit);
}

// ================= CE =================
function regenCE() {
    let regen = Math.sqrt(player.maxCe) * 0.6 * player.ceControl;
    player.ce = clamp(player.ce + regen, 0, player.maxCe);
}

// ================= ACTIONS =================
function attack() {
    let dmg = calculateDamage(player, enemy);
    enemy.hp -= dmg;
    log(`⚔️ You deal ${dmg}`);
    nextTurn();
}

function technique() {
    let cost = 25;
    if (player.ce < cost) return log("Not enough CE!");

    player.ce -= cost;

    let dmg = (player.atk * 2 + Math.sqrt(player.ce)) * player.ceControl;
    dmg *= rand(0.9, 1.2);

    dmg = Math.floor(dmg);
    enemy.hp -= dmg;

    log(`💥 Technique hits ${dmg}`);
    nextTurn();
}

function domain() {
    let cost = 50;

    if (player.ce < cost) return log("Not enough CE!");
    if (player.domainTurns > 0) return log("Domain already active!");

    player.ce -= cost;
    player.domainTurns = 3;

    player.atk *= 1.5;
    player.def *= 1.5;
    player.luck += 0.25;

    log("🌌 DOMAIN EXPANSION!");
    nextTurn();
}

// ================= ENEMY =================
function enemyTurn() {
    if (enemy.hp <= 0) return;

    if (Math.random() < enemy.aggression) {
        let dmg = calculateDamage(enemy, player);
        player.hp -= dmg;
        log(`👹 Enemy hits ${dmg}`);
    } else {
        let boost = rand(0.1, 0.3);
        enemy.def *= (1 + boost);

        // cap defense
        enemy.def = Math.min(enemy.def, 20);

        log(`🛡 Enemy reinforces defense`);
    }
}

// ================= TURN =================
function nextTurn() {
    regenCE();
    enemyTurn();

    // Domain countdown
    if (player.domainTurns > 0) {
        player.domainTurns--;

        if (player.domainTurns === 0) {
            player.atk /= 1.5;
            player.def /= 1.5;
            player.luck -= 0.25;

            log("Domain faded...");
        }
    }

    updateUI();
    checkGame();
}

// ================= UI =================
function barHTML(value, max, cls) {
    let percent = (value / max) * 100;
    return `
        <div class="bar">
            <div class="fill ${cls}" style="width:${percent}%"></div>
        </div>
    `;
}

function updateUI() {
    document.getElementById("playerPanel").innerHTML = `
        <h3>🧙 Player</h3>
        HP: ${player.hp.toFixed(1)} / ${player.maxHp}
        ${barHTML(player.hp, player.maxHp, "hp")}
        CE: ${player.ce.toFixed(1)} / ${player.maxCe}
        ${barHTML(player.ce, player.maxCe, "ce")}
        ATK: ${player.atk.toFixed(2)} | DEF: ${player.def.toFixed(2)}
    `;

    document.getElementById("enemyPanel").innerHTML = `
        <h3>👹 Curse</h3>
        HP: ${enemy.hp.toFixed(1)}
        ${barHTML(enemy.hp, 150, "hp")}
        ATK: ${enemy.atk} | DEF: ${enemy.def.toFixed(2)}
    `;
}

// ================= GAME =================
function checkGame() {
    if (player.hp <= 0) {
        log("💀 You lost...");
        disableButtons();
    }
    if (enemy.hp <= 0) {
        log("🏆 You win!");
        disableButtons();
    }
}

function disableButtons() {
    document.querySelectorAll("button").forEach(b => b.disabled = true);
}

// ================= INIT =================
updateUI();
log("Battle Start!");

</script>

</body>
</html>
