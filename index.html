<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jujutsu Sorcerer Reborn</title>

<style>
body {
    margin:0;
    font-family:Segoe UI;
    background: radial-gradient(circle, #1a1a2e, #0d0d0d);
    color:white;
    text-align:center;
}

.panel {
    background:#111;
    margin:10px auto;
    padding:15px;
    width:80%;
    border-radius:10px;
    box-shadow:0 0 15px rgba(127,90,240,0.3);
}

.bar {height:20px;background:#333;border-radius:10px;overflow:hidden;}
.fill {height:100%;transition:.3s;}
.hp {background:red;}
.ce {background:cyan;}

button {
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:6px;
    background:#7f5af0;
    color:white;
    cursor:pointer;
}
button:disabled {opacity:0.4;}

.log {
    height:180px;
    overflow-y:auto;
    background:black;
    padding:10px;
    text-align:left;
}
</style>
</head>

<body>

<h1>⚡ Jujutsu Sorcerer ⚡</h1>

<div class="panel" id="playerUI"></div>
<div class="panel" id="enemyUI"></div>

<div class="panel">
    <button id="atkBtn" onclick="attack()">Attack</button>
    <button id="techBtn" onclick="technique()">Technique</button>
    <button id="domainBtn" onclick="domain()">Domain</button>
</div>

<div class="panel log" id="log"></div>

<div class="panel" id="endPanel"></div>

<script>

// ===== GAME STATE =====
let game;

function initGame() {
game = {
    player:{
        hp:120,maxHp:120,
        ce:100,maxCe:100,
        atk:15,def:8,
        luck:0.15,
        combo:0,
        cooldowns:{tech:0,domain:0},
        domainTurns:0
    },
    enemy:{
        hp:150,
        atk:12,
        def:6,
        phase:1
    },
    over:false
};

document.getElementById("log").innerHTML="";
document.getElementById("endPanel").innerHTML="";
enableButtons();
updateUI();
log("Battle Start!");
}

// ===== HELPERS =====
function rand(a,b){return Math.random()*(b-a)+a;}
function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
function log(msg){
let el=document.getElementById("log");
el.innerHTML+=msg+"<br>";
el.scrollTop=el.scrollHeight;
}

// ===== DAMAGE =====
function dmg(atk,def,critChance,forceCrit=false){
let base = Math.pow(atk,1.1)/Math.pow(def,0.9);
let variance = rand(0.9,1.15);

let crit = (forceCrit || Math.random()<critChance)?1.8:1;

return Math.floor(base*variance*crit);
}

// ===== ACTIONS =====
function attack(){
if(game.over) return;

let p=game.player,e=game.enemy;

let damage = dmg(p.atk,e.def,p.luck);

damage += Math.floor(p.combo*2); // combo scaling

e.hp -= damage;
p.combo++;

log(`⚔️ Attack deals ${damage} (Combo x${p.combo})`);

turn();
}

function technique(){
let p=game.player,e=game.enemy;

if(p.cooldowns.tech>0) return log("Technique on cooldown!");
if(p.ce<25) return log("Not enough CE!");

p.ce-=25;
p.cooldowns.tech=2;

// scaling formula
let damage = (p.atk*2 + Math.sqrt(p.ce))*1.2;
damage *= rand(0.9,1.2);

e.hp -= Math.floor(damage);

p.combo++;

log(`💥 Technique hits ${Math.floor(damage)}`);

turn();
}

function domain(){
let p=game.player;

if(p.cooldowns.domain>0) return log("Domain on cooldown!");
if(p.ce<50) return log("Not enough CE!");

p.ce-=50;
p.domainTurns=3;
p.cooldowns.domain=5;

log("🌌 DOMAIN EXPANSION — GUARANTEED HITS!");

turn();
}

// ===== ENEMY =====
function enemyTurn(){
let p=game.player,e=game.enemy;

if(e.hp<=0) return;

// phase change
if(e.hp<70 && e.phase===1){
e.phase=2;
e.atk*=1.3;
log("🔥 Enemy enters Phase 2!");
}

let damage = dmg(e.atk,p.def,0.05);

p.hp -= damage;

log(`👹 Enemy deals ${damage}`);

p.combo=0; // combo reset if hit
}

// ===== TURN =====
function turn(){
let p=game.player,e=game.enemy;

// Domain effect
let forceCrit = p.domainTurns>0;

// Apply attack modifier for domain
if(forceCrit){
p.luck = 1;
}

// enemy turn
enemyTurn();

// restore luck after domain calc
if(forceCrit){
p.luck = 0.15;
p.domainTurns--;
}

// cooldowns
for(let k in p.cooldowns){
if(p.cooldowns[k]>0) p.cooldowns[k]--;
}

// regen CE
p.ce += Math.sqrt(p.maxCe)*0.5;
p.ce = clamp(p.ce,0,p.maxCe);

// clamp HP
p.hp = clamp(p.hp,0,p.maxHp);
e.hp = clamp(e.hp,0,150);

updateUI();
checkGame();
}

// ===== UI =====
function bar(v,m,c){
return `<div class="bar"><div class="fill ${c}" style="width:${(v/m)*100}%"></div></div>`;
}

function updateUI(){
let p=game.player,e=game.enemy;

document.getElementById("playerUI").innerHTML=`
<h3>Player</h3>
HP: ${p.hp} ${bar(p.hp,p.maxHp,"hp")}
CE: ${p.ce.toFixed(1)} ${bar(p.ce,p.maxCe,"ce")}
Combo: ${p.combo}
Domain: ${p.domainTurns>0 ? p.domainTurns+" turns" : "Ready"}
`;

document.getElementById("enemyUI").innerHTML=`
<h3>Curse (Phase ${e.phase})</h3>
HP: ${e.hp} ${bar(e.hp,150,"hp")}
`;
}

// ===== GAME END =====
function checkGame(){
let p=game.player,e=game.enemy;

if(p.hp<=0){
endGame("💀 You Lost");
}
if(e.hp<=0){
endGame("🏆 Victory!");
}
}

function endGame(msg){
game.over=true;
disableButtons();

document.getElementById("endPanel").innerHTML=
`<h2>${msg}</h2>
<button onclick="initGame()">Restart Battle</button>`;
}

// ===== BUTTONS =====
function disableButtons(){
document.querySelectorAll("button").forEach(b=>b.disabled=true);
}
function enableButtons(){
document.querySelectorAll("button").forEach(b=>b.disabled=false);
}

// ===== INIT =====
initGame();

</script>

</body>
</html>
