<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jujutsu Sorcerer Awakening</title>

<style>
body{
    background:#0d0d0d;
    color:white;
    font-family:sans-serif;
    text-align:center;
}
.panel{
    background:#111;
    margin:10px auto;
    padding:15px;
    width:80%;
    border-radius:10px;
}
.bar{height:20px;background:#333;border-radius:10px;overflow:hidden;}
.fill{height:100%;}
.hp{background:red;}
.ce{background:cyan;}

button{
    padding:10px;
    margin:5px;
    background:#7f5af0;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

.log{
    height:180px;
    overflow:auto;
    background:black;
    padding:10px;
    text-align:left;
}
</style>
</head>

<body>

<h1>⚡ Jujutsu Awakening ⚡</h1>

<div class="panel" id="playerUI"></div>
<div class="panel" id="enemyUI"></div>

<div class="panel" id="actions"></div>

<div class="panel log" id="log"></div>
<div class="panel" id="end"></div>

<script>

let game;

function init(){
game={
p:{
hp:120,maxHp:120,
ce:100,maxCe:100,
atk:15,def:8,
combo:0,
guard:false,
domain:0,
cool:0
},
e:{
hp:150,
atk:12,
def:6,
intent:"attack"
},
over:false
};

document.getElementById("log").innerHTML="";
document.getElementById("end").innerHTML="";
update();
log("Battle Start!");
}

// ===== HELPERS =====
function rand(a,b){return Math.random()*(b-a)+a;}
function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
function log(t){
let el=document.getElementById("log");
el.innerHTML+=t+"<br>";
el.scrollTop=el.scrollHeight;
}

// ===== DAMAGE =====
function damage(a,d,crit=false){
let base=Math.pow(a,1.1)/Math.pow(d,0.9);
let v=rand(0.9,1.1);
let c=crit?2:1;
return Math.floor(base*v*c);
}

// ===== ACTIONS =====
function attack(){
let p=game.p,e=game.e;

let crit = p.domain>0;
let dmg=damage(p.atk,e.def,crit);

dmg+=p.combo*2;

e.hp-=dmg;
p.combo++;

log(`⚔️ Attack ${dmg}`);
turn();
}

function technique(){
let p=game.p,e=game.e;

if(p.ce<25) return log("No CE");

p.ce-=25;

let dmg=(p.atk*2+Math.sqrt(p.ce))*rand(0.9,1.2);

if(p.domain>0) dmg*=1.5;

e.hp-=Math.floor(dmg);
p.combo++;

log(`💥 Technique ${Math.floor(dmg)}`);
turn();
}

function guard(){
game.p.guard=true;
log("🛡 Guarding...");
turn();
}

// 🌌 DOMAIN FIXED
function domain(){
let p=game.p;

if(p.ce<50) return log("Not enough CE");

p.ce-=50;
p.domain=3;

log("🌌 DOMAIN EXPANSION!");
update();
}

// ⭐ NEW MOVE (only in domain)
function sureHit(){
let p=game.p,e=game.e;

let dmg = 20 + p.combo*3; // TRUE DAMAGE

e.hp-=dmg;

log(`💠 Sure-Hit Strike ${dmg}`);
turn();
}

// ===== ENEMY =====
function enemyIntent(){
game.e.intent = Math.random()<0.7 ? "attack" : "heavy";
}

function enemyTurn(){
let p=game.p,e=game.e;

if(e.hp<=0) return;

let dmg;

if(e.intent==="attack"){
dmg=damage(e.atk,p.def);
}
else{
dmg=damage(e.atk*1.5,p.def);
log("⚠️ Enemy used HEAVY attack!");
}

// guard reduces damage
if(p.guard) dmg*=0.4;

// domain reduces incoming damage
if(p.domain>0) dmg*=0.7;

p.hp-=Math.floor(dmg);

log(`👹 Enemy deals ${Math.floor(dmg)}`);

p.guard=false;
p.combo=0;
}

// ===== TURN =====
function turn(){
enemyTurn();

if(game.p.domain>0){
game.p.domain--;
}

game.p.ce += Math.sqrt(game.p.maxCe)*0.5;
game.p.ce = clamp(game.p.ce,0,game.p.maxCe);

game.p.hp=clamp(game.p.hp,0,game.p.maxHp);
game.e.hp=clamp(game.e.hp,0,150);

enemyIntent();

update();
check();
}

// ===== UI =====
function bar(v,m,c){
return `<div class="bar"><div class="fill ${c}" style="width:${(v/m)*100}%"></div></div>`;
}

function update(){

let p=game.p,e=game.e;

// dynamic action panel
let actions="";

if(p.domain>0){
actions+=`<button onclick="sureHit()">Sure-Hit</button>`;
}
else{
actions+=`
<button onclick="attack()">Attack</button>
<button onclick="technique()">Technique</button>
<button onclick="guard()">Guard</button>
<button onclick="domain()">Domain</button>
`;
}

document.getElementById("actions").innerHTML=actions;

document.getElementById("playerUI").innerHTML=`
HP ${p.hp}${bar(p.hp,p.maxHp,"hp")}
CE ${p.ce.toFixed(1)}${bar(p.ce,p.maxCe,"ce")}
Combo: ${p.combo}
Domain: ${p.domain}
`;

document.getElementById("enemyUI").innerHTML=`
Enemy HP ${e.hp}${bar(e.hp,150,"hp")}
Intent: ${e.intent}
`;
}

// ===== GAME =====
function check(){
if(game.p.hp<=0){
end("💀 You Lose");
}
if(game.e.hp<=0){
end("🏆 Victory");
}
}

function end(msg){
game.over=true;
document.getElementById("end").innerHTML=
`<h2>${msg}</h2><button onclick="init()">Restart</button>`;
}

// ===== INIT =====
init();
enemyIntent();

</script>

</body>
</html>
