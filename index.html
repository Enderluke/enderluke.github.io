<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jujutsu Math Sorcerer</title>
<style>
    body {
        background: #0d0d0d;
        color: #e6e6e6;
        font-family: monospace;
        text-align: center;
    }
    .panel {
        border: 2px solid #444;
        padding: 15px;
        margin: 10px auto;
        width: 80%;
        background: #1a1a1a;
    }
    button {
        background: #222;
        color: #fff;
        border: 1px solid #555;
        padding: 10px;
        margin: 5px;
        cursor: pointer;
    }
    button:hover {
        background: #444;
    }
    .log {
        height: 200px;
        overflow-y: scroll;
        text-align: left;
        background: black;
        padding: 10px;
    }
</style>
</head>
<body>

<h1>⚡ Jujutsu Math Sorcerer ⚡</h1>

<div class="panel" id="stats"></div>

<div class="panel">
    <button onclick="attack()">Basic Attack</button>
    <button onclick="technique()">Cursed Technique</button>
    <button onclick="domain()">Domain Expansion</button>
</div>

<div class="panel log" id="log"></div>

<script>
// ==========================
// CORE PLAYER + ENEMY STATS
// ==========================
let player = {
    hp: 120,
    maxHp: 120,
    ce: 100,
    maxCe: 100,
    atk: 15,
    def: 8,
    ceControl: 1.2,   // multiplier
    luck: 0.15,       // crit probability
    domainActive: false
};

let enemy = {
    hp: 150,
    atk: 12,
    def: 6,
    aggression: 0.6 // AI decision weight
};

// ==========================
// UTILITY FUNCTIONS
// ==========================

// Random number
function rand(min, max) {
    return Math.random() * (max - min) + min;
}

// Log system
function log(msg) {
    document.getElementById("log").innerHTML += msg + "<br>";
}

// Clamp values
function clamp(val, min, max) {
    return Math.max(min, Math.min(max, val));
}

// ==========================
// DAMAGE FORMULA
// ==========================
// Damage = (Attack^1.1 / Defense^0.9) * randomness * crit

function calculateDamage(attacker, defender) {
    let base = Math.pow(attacker.atk, 1.1) / Math.pow(defender.def, 0.9);

    let randomness = rand(0.85, 1.15);

    let crit = Math.random() < player.luck ? 1.8 : 1;

    return Math.floor(base * randomness * crit);
}

// ==========================
// CURSED ENERGY SYSTEM
// ==========================
// CE Regen Formula:
// regen = sqrt(maxCE) * 0.8 * controlFactor

function regenCE() {
    let regen = Math.sqrt(player.maxCe) * 0.8 * player.ceControl;
    player.ce = clamp(player.ce + regen, 0, player.maxCe);
}

// ==========================
// ACTIONS
// ==========================

function attack() {
    let dmg = calculateDamage(player, enemy);
    enemy.hp -= dmg;

    log(`You strike for ${dmg} damage.`);

    nextTurn();
}

function technique() {
    let cost = 25;

    if (player.ce < cost) {
        log("Not enough cursed energy!");
        return;
    }

    player.ce -= cost;

    // Technique scaling:
    // damage = (atk * 2 + CE^0.5) * control multiplier

    let dmg = (player.atk * 2 + Math.sqrt(player.ce)) * player.ceControl;

    // add variance
    dmg *= rand(0.9, 1.2);

    dmg = Math.floor(dmg);

    enemy.hp -= dmg;

    log(`Cursed Technique hits for ${dmg} damage.`);

    nextTurn();
}

function domain() {
    let cost = 50;

    if (player.ce < cost) {
        log("Not enough energy for Domain Expansion!");
        return;
    }

    player.ce -= cost;
    player.domainActive = true;

    // Domain Buffs:
    player.atk *= 1.5;
    player.def *= 1.5;
    player.luck += 0.25;

    log("DOMAIN EXPANSION ACTIVATED!");

    nextTurn();
}

// ==========================
// ENEMY AI
// ==========================

function enemyTurn() {
    if (enemy.hp <= 0) return;

    let choice = Math.random();

    let dmg;

    // Weighted decision system
    if (choice < enemy.aggression) {
        dmg = calculateDamage(enemy, player);
        player.hp -= dmg;
        log(`Enemy attacks for ${dmg}`);
    } else {
        // defensive move (math-based)
        let shield = Math.floor(enemy.def * rand(1.2, 2.0));
        enemy.def += shield * 0.1;
        log(`Enemy reinforces defense (+${shield})`);
    }
}

// ==========================
// TURN LOOP
// ==========================

function nextTurn() {
    regenCE();
    enemyTurn();

    // Domain wears off after 3 turns probabilistically
    if (player.domainActive && Math.random() < 0.3) {
        player.domainActive = false;
        player.atk /= 1.5;
        player.def /= 1.5;
        player.luck -= 0.25;
        log("Domain Expansion faded.");
    }

    updateUI();
    checkGameState();
}

// ==========================
// GAME STATE CHECK
// ==========================

function checkGameState() {
    if (player.hp <= 0) {
        log("You were exorcised...");
        disableButtons();
    }

    if (enemy.hp <= 0) {
        log("Curse defeated!");
        disableButtons();
    }
}

function disableButtons() {
    document.querySelectorAll("button").forEach(btn => btn.disabled = true);
}

// ==========================
// UI UPDATE
// ==========================

function updateUI() {
    document.getElementById("stats").innerHTML = `
        <h3>Player</h3>
        HP: ${player.hp.toFixed(1)} / ${player.maxHp}<br>
        CE: ${player.ce.toFixed(1)} / ${player.maxCe}<br>
        ATK: ${player.atk.toFixed(2)} | DEF: ${player.def.toFixed(2)}<br>
        Luck: ${(player.luck * 100).toFixed(1)}%<br>
        <hr>
        <h3>Enemy</h3>
        HP: ${enemy.hp.toFixed(1)}<br>
        ATK: ${enemy.atk} | DEF: ${enemy.def.toFixed(2)}
    `;
}

// ==========================
// INIT
// ==========================

updateUI();
log("Battle Start.");

</script>

</body>
</html>
