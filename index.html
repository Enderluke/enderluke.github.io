<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Player
const player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  size: 20,
  speed: 4
};

// Tail
let tail = [];
let maxTailLength = 20;
const segmentSpacing = 12;

// Food
let foods = [];

function spawnFood() {
  foods.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: 10
  });
}

for (let i = 0; i < 10; i++) spawnFood();

// Input
const keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Helpers
function distance(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

// Initialize tail
function addSegment() {
  const last = tail.length > 0 ? tail[tail.length - 1] : player;
  tail.push({ x: last.x, y: last.y });
}

// Update
function update() {
  // Movement
  if (keys["w"] || keys["arrowup"]) player.y -= player.speed;
  if (keys["s"] || keys["arrowdown"]) player.y += player.speed;
  if (keys["a"] || keys["arrowleft"]) player.x -= player.speed;
  if (keys["d"] || keys["arrowright"]) player.x += player.speed;

  // Boundaries
  player.x = Math.max(0, Math.min(canvas.width, player.x));
  player.y = Math.max(0, Math.min(canvas.height, player.y));

  // Ensure tail length
  while (tail.length < maxTailLength) {
    addSegment();
  }

  // Tail physics (follow system)
  let prev = player;
  for (let i = 0; i < tail.length; i++) {
    let seg = tail[i];

    let dx = prev.x - seg.x;
    let dy = prev.y - seg.y;
    let dist = Math.hypot(dx, dy);

    if (dist > 0) {
      let angle = Math.atan2(dy, dx);
      let targetX = prev.x - Math.cos(angle) * segmentSpacing;
      let targetY = prev.y - Math.sin(angle) * segmentSpacing;

      // Smooth follow (lerp)
      seg.x += (targetX - seg.x) * 0.35;
      seg.y += (targetY - seg.y) * 0.35;
    }

    prev = seg;
  }

  // Food collision
  for (let i = foods.length - 1; i >= 0; i--) {
    if (distance(player, foods[i]) < player.size) {
      foods.splice(i, 1);
      maxTailLength += 6;
      spawnFood();
    }
  }
}

// Draw
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Food
  ctx.fillStyle = "yellow";
  foods.forEach(f => {
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // Tail (connected + smooth)
  for (let i = tail.length - 1; i >= 0; i--) {
    const seg = tail[i];
    const t = i / tail.length;

    const size = player.size * (0.9 - t * 0.6);

    ctx.fillStyle = `rgba(0, 0, 255, ${0.3 + (1 - t) * 0.7})`;

    ctx.beginPath();
    ctx.arc(seg.x, seg.y, size, 0, Math.PI * 2);
    ctx.fill();
  }

  // Player
  ctx.fillStyle = "blue";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
  ctx.fill();
}

// Loop
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();

// Resize
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
