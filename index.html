<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>2D Walking Simulator + Tail</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #222;
    }

    canvas {
      display: block;
      background: #3c9c3c;
    }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Player
const player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  size: 20,
  speed: 4
};

// Tail system
let tail = [];
let maxTailLength = 20;

// Food
let foods = [];

// Spawn food
function spawnFood() {
  foods.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: 10
  });
}

// Initial food
for (let i = 0; i < 10; i++) spawnFood();

// Input
const keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Distance helper
function distance(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

// Update
function update() {
  // Movement
  if (keys["w"] || keys["arrowup"]) player.y -= player.speed;
  if (keys["s"] || keys["arrowdown"]) player.y += player.speed;
  if (keys["a"] || keys["arrowleft"]) player.x -= player.speed;
  if (keys["d"] || keys["arrowright"]) player.x += player.speed;

  // Boundaries
  player.x = Math.max(0, Math.min(canvas.width, player.x));
  player.y = Math.max(0, Math.min(canvas.height, player.y));

  // --- Improved tail (smoothed positions) ---
  const last = tail.length > 0 ? tail[tail.length - 1] : player;

  tail.push({
    x: last.x + (player.x - last.x) * 0.5,
    y: last.y + (player.y - last.y) * 0.5
  });

  while (tail.length > maxTailLength) {
    tail.shift();
  }

  // Food collision
  for (let i = foods.length - 1; i >= 0; i--) {
    if (distance(player, foods[i]) < player.size) {
      foods.splice(i, 1);
      maxTailLength += 10;
      spawnFood();
    }
  }
}

// Draw
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw food
  ctx.fillStyle = "yellow";
  foods.forEach(f => {
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // --- Improved tail rendering ---
  for (let i = 0; i < tail.length; i++) {
    const t = tail[i];
    const progress = i / tail.length;

    const size = player.size * (0.9 - progress * 0.7);
    const alpha = 0.2 + (1 - progress) * 0.8;

    ctx.fillStyle = `rgba(0, 0, 255, ${alpha})`;

    ctx.beginPath();
    ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw player
  ctx.fillStyle = "blue";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
  ctx.fill();
}

// Loop
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();

// Resize
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
