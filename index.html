<!DOCTYPE html>
<html>
<head>
  <title>Sorcerer Build Draft+</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 { margin-bottom: 5px; }

    #progress {
      height: 10px;
      background: #333;
      border-radius: 10px;
      margin: 15px auto;
      width: 60%;
      overflow: hidden;
    }

    #bar {
      height: 100%;
      width: 0%;
      background: #00d4ff;
      transition: 0.4s;
    }

    .card {
      display: inline-block;
      background: #222;
      padding: 15px;
      margin: 10px;
      border-radius: 12px;
      cursor: pointer;
      width: 200px;
      transition: 0.25s;
      border: 2px solid transparent;
    }

    .card:hover {
      transform: scale(1.08);
      border-color: #00d4ff;
    }

    .rare { border-color: gold; }
    .epic { border-color: violet; }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    .fade {
      animation: fadeIn 0.4s;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px);}
      to { opacity: 1; transform: translateY(0);}
    }

    ul { list-style: none; padding: 0; }
  </style>
</head>

<body>

<h1>Sorcerer Build Draft ⚔️+</h1>
<h3 id="trait"></h3>

<div id="progress"><div id="bar"></div></div>

<div id="choices"></div>

<h3>Your Build</h3>
<ul id="picked"></ul>

<div id="result"></div>

<script>
const traits = [
  "Technique", "Domain", "Speed", "IQ", "Durability",
  "Energy", "Battle Sense", "Reflexes", "Power", "Control"
];

const sorcerers = [
  { name: "Gojo", stats: {tech:10, dom:10, spd:8, iq:9, dur:7}, rarity:"epic" },
  { name: "Sukuna", stats: {tech:9, dom:9, spd:7, iq:8, dur:10}, rarity:"epic" },
  { name: "Megumi", stats: {tech:8, dom:7, spd:9, iq:8, dur:7}, rarity:"rare" },
  { name: "Toji", stats: {tech:6, dom:5, spd:10, iq:7, dur:10}, rarity:"rare" },
  { name: "Mahito", stats: {tech:9, dom:8, spd:7, iq:8, dur:8}, rarity:"rare" },
  { name: "Shoko", stats: {tech:7, dom:8, spd:6, iq:9, dur:9}, rarity:"common" },
  { name: "Tengen", stats: {tech:8, dom:10, spd:6, iq:9, dur:7}, rarity:"rare" },
  { name: "Kusakabe", stats: {tech:7, dom:6, spd:10, iq:7, dur:8}, rarity:"common" },
  { name: "Yuta", stats: {tech:8, dom:8, spd:8, iq:8, dur:7}, rarity:"epic" }
];

let currentTrait = 0;
let picked = [];
let totalStats = {
  tech:0, dom:0, spd:0, iq:0, dur:0
};

function getChoices() {
  return [...sorcerers].sort(() => Math.random() - 0.5).slice(0, 3);
}

function updateProgress() {
  let percent = (currentTrait / traits.length) * 100;
  document.getElementById("bar").style.width = percent + "%";
}

function renderChoices() {
  updateProgress();

  document.getElementById("trait").innerText =
    "Pick for: " + traits[currentTrait];

  let container = document.getElementById("choices");
  container.innerHTML = "";

  getChoices().forEach(char => {
    let div = document.createElement("div");
    div.className = "card fade " + char.rarity;

    div.innerHTML = `
      <b>${char.name}</b><br>
      <small>${char.rarity.toUpperCase()}</small>
      <hr>
      ⚡ ${char.stats.tech}
      🌌 ${char.stats.dom}
      🏃 ${char.stats.spd}
      🧠 ${char.stats.iq}
      🛡 ${char.stats.dur}
    `;

    div.onclick = () => select(char);

    container.appendChild(div);
  });
}

function select(char) {
  picked.push(char);

  for (let key in totalStats) {
    totalStats[key] += char.stats[key];
  }

  let li = document.createElement("li");
  li.innerText = traits[currentTrait] + ": " + char.name;
  document.getElementById("picked").appendChild(li);

  currentTrait++;

  if (currentTrait >= traits.length) {
    showResult();
  } else {
    renderChoices();
  }
}

function getGrade(avg) {
  if (avg >= 9) return "Special Grade ⚡";
  if (avg >= 7.5) return "Grade 1";
  if (avg >= 6) return "Grade 2";
  if (avg >= 4.5) return "Grade 3";
  return "Grade 4";
}

function getSynergy() {
  if (totalStats.tech > 80 && totalStats.dom > 80)
    return "Domain Master 🌀";
  if (totalStats.spd > 85)
    return "Speed Demon ⚡";
  if (totalStats.dur > 85)
    return "Immortal Tank 🛡";
  return "Balanced Build";
}

function showResult() {
  document.getElementById("choices").innerHTML = "";
  document.getElementById("trait").innerText = "Build Complete";

  let sum = Object.values(totalStats).reduce((a,b)=>a+b,0);
  let avg = sum / picked.length;

  document.getElementById("result").innerHTML = `
    <h2>${getGrade(avg)}</h2>
    <h3>${getSynergy()}</h3>
    <p>Avg Power: ${avg.toFixed(2)}</p>

    <h3>Stats:</h3>
    <p>
      Tech: ${totalStats.tech} |
      Domain: ${totalStats.dom} |
      Speed: ${totalStats.spd} |
      IQ: ${totalStats.iq} |
      Durability: ${totalStats.dur}
    </p>

    <button onclick="location.reload()">Play Again</button>
  `;
}

renderChoices();
</script>

</body>
</html>
