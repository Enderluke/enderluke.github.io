<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>2D Walking Simulator + Tail</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #1a1a1a;
    }

    canvas {
      display: block;
      background: #2e7d32;
    }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Player
const player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  size: 20,
  speed: 4
};

// Tail system
let tail = [];
let maxTailLength = 25;

// Food
let foods = [];

function spawnFood() {
  foods.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: 10
  });
}

for (let i = 0; i < 12; i++) spawnFood();

// Input
const keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Distance helper
function distance(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

// Update
function update() {
  if (keys["w"] || keys["arrowup"]) player.y -= player.speed;
  if (keys["s"] || keys["arrowdown"]) player.y += player.speed;
  if (keys["a"] || keys["arrowleft"]) player.x -= player.speed;
  if (keys["d"] || keys["arrowright"]) player.x += player.speed;

  player.x = Math.max(0, Math.min(canvas.width, player.x));
  player.y = Math.max(0, Math.min(canvas.height, player.y));

  // Smooth tail positions
  const last = tail.length > 0 ? tail[tail.length - 1] : player;

  tail.push({
    x: last.x + (player.x - last.x) * 0.35,
    y: last.y + (player.y - last.y) * 0.35
  });

  while (tail.length > maxTailLength) {
    tail.shift();
  }

  // Food collision
  for (let i = foods.length - 1; i >= 0; i--) {
    if (distance(player, foods[i]) < player.size) {
      foods.splice(i, 1);
      maxTailLength += 8;
      spawnFood();
    }
  }
}

// Draw background grid
function drawGrid() {
  const gridSize = 40;
  ctx.strokeStyle = "rgba(255,255,255,0.05)";
  ctx.lineWidth = 1;

  for (let x = 0; x < canvas.width; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }

  for (let y = 0; y < canvas.height; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
}

// Draw
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawGrid();

  // Draw tail as smooth ribbon
  if (tail.length > 1) {
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    for (let i = 1; i < tail.length; i++) {
      const p1 = tail[i - 1];
      const p2 = tail[i];

      const t = i / tail.length;

      ctx.strokeStyle = `hsl(${200 + t * 100}, 80%, 60%)`;
      ctx.lineWidth = player.size * (0.8 - t * 0.6);

      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.stroke();
    }
  }

  // Food (glowy)
  foods.forEach(f => {
    const glow = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.size * 2);
    glow.addColorStop(0, "#fff176");
    glow.addColorStop(1, "rgba(255,255,0,0)");

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size * 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#ffeb3b";
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // Player glow
  const glow = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, player.size * 2);
  glow.addColorStop(0, "#64b5f6");
  glow.addColorStop(1, "rgba(0,0,255,0)");

  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.size * 2, 0, Math.PI * 2);
  ctx.fill();

  // Player
  ctx.fillStyle = "#2196f3";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
  ctx.fill();
}

// Loop
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
